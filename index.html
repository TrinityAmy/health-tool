<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康内容助手</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap');
  :root{--ink:#1a1a18;--paper:#f5f0e8;--paper2:#ede7d8;--accent:#c8432a;--accent2:#2a7c6f;--muted:#7a7060;--border:#cfc5b0;--card:#faf6ee}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:'Noto Serif SC',serif;min-height:100vh}
  header{background:var(--ink);color:var(--paper);padding:24px 40px;display:flex;align-items:baseline;gap:16px;border-bottom:3px solid var(--accent)}
  header h1{font-family:'Instrument Serif',serif;font-size:24px;font-weight:400}
  header span{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.12em;text-transform:uppercase}
  .main{max-width:900px;margin:0 auto;padding:36px 24px 100px}
  .cat{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:24px 0 10px;padding-bottom:5px;border-bottom:1px solid var(--border)}
  .cat:first-of-type{margin-top:0}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px}
  .ch{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .15s}
  .ch:hover{background:var(--paper2);border-color:var(--ink)}
  .ch.active{background:var(--ink);border-color:var(--ink)}
  .ch.active .cn{color:var(--paper)}.ch.active .ct{color:#c8a07a}
  .cn{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;margin-bottom:3px}
  .ct{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
  .bar{position:fixed;bottom:0;left:0;right:0;background:var(--paper);border-top:1px solid var(--border);padding:14px 40px;display:flex;gap:12px;align-items:center;z-index:100}
  .sel{flex:1;font-size:13px;color:var(--muted)}.sel strong{color:var(--ink)}
  select{background:var(--card);border:1px solid var(--border);border-radius:4px;padding:9px 14px;font-family:'Noto Serif SC',serif;font-size:13px;color:var(--ink);outline:none;cursor:pointer}
  .btn{background:var(--accent);color:white;border:none;border-radius:4px;padding:10px 28px;font-family:'Noto Serif SC',serif;font-size:14px;cursor:pointer;transition:opacity .15s;white-space:nowrap}
  .btn:hover{opacity:.88}.btn:disabled{opacity:.35;cursor:not-allowed}
  .status{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin:16px 0;min-height:18px;display:flex;align-items:center;gap:8px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  .video-card{background:var(--card);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;overflow:hidden}
  .vc-head{display:flex;align-items:flex-start;gap:12px;padding:14px 16px}
  .vc-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:22px;flex-shrink:0;padding-top:2px}
  .vc-meta{flex:1;min-width:0}
  .vc-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:3px}
  .vc-info{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .vc-btn{background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .vc-btn:hover{border-color:var(--accent);color:var(--accent)}
  .vc-btn:disabled{opacity:.5;cursor:not-allowed}
  .vc-body{display:none;padding:4px 16px 16px 50px;border-top:1px solid var(--border)}
  .vc-body.open{display:block}
  .sec{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
  .kp{font-size:13px;line-height:1.85;white-space:pre-wrap}
  .draft{background:var(--paper2);border-left:3px solid var(--accent2);border-radius:0 4px 4px 0;padding:14px 16px;font-size:14px;line-height:1.9;white-space:pre-wrap}
  .copy{margin-top:8px;background:transparent;border:1px solid var(--border);border-radius:4px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s}
  .copy:hover{border-color:var(--ink);color:var(--ink)}.copy.done{border-color:var(--accent2);color:var(--accent2)}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
  .tag{background:var(--paper2);border:1px solid var(--border);border-radius:3px;padding:3px 9px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
  .empty{text-align:center;padding:60px 20px;color:var(--muted);font-family:'DM Mono',monospace;font-size:12px}
  .err{background:#fff0ee;border:1px solid #e8b8b0;border-radius:4px;padding:12px 16px;font-size:13px;color:var(--accent);margin:12px 0}
</style>
</head>
<body>
<header>
  <h1>健康内容助手</h1>
  <span>YouTube → 小红书草稿</span>
</header>
<div class="main">
  <div class="cat">科学硬核派</div><div class="grid" id="g1"></div>
  <div class="cat">女性健康专项</div><div class="grid" id="g2"></div>
  <div class="cat">顶级访谈节目</div><div class="grid" id="g3"></div>
  <div class="cat">营养 & 生物黑客</div><div class="grid" id="g4"></div>
  <div class="status" id="status"></div>
  <div id="errBox"></div>
  <div id="results"><div class="empty">选择频道后点击抓取，获取最新视频后逐一生成草稿</div></div>
</div>
<div class="bar">
  <div class="sel" id="selDisplay">请先选择一个频道</div>
  <select id="countSel"><option value="3" selected>最新 3 集</option><option value="5">最新 5 集</option></select>
  <button class="btn" id="fetchBtn" onclick="fetchVideos()" disabled>获取最新视频</button>
</div>
<script>
const CHANNELS={
  g1:[{n:'Huberman Lab',t:'神经科学 · 睡眠 · 激素'},{n:'Peter Attia – The Drive',t:'长寿 · 代谢 · 心血管'},{n:'Found My Fitness – Rhonda Patrick',t:'营养生化 · 抗衰老'},{n:'Dr. Mark Hyman',t:'功能医学 · 肠道健康'},{n:'ZOE – Tim Spector',t:'肠道微生物 · 个性化营养'}],
  g2:[{n:'Dr. Mindy Pelz',t:'女性断食 · 激素 · 更年期'},{n:'Mel Robbins',t:'心理健康 · 习惯 · 表现'}],
  g3:[{n:'The Diary of a CEO – Steven Bartlett',t:'顶级访谈 · 健康 · 表现'},{n:'The Proof – Simon Hill',t:'营养科学访谈'},{n:'On Purpose – Jay Shetty',t:'心理健康 · 正念'}],
  g4:[{n:'Ben Greenfield Life',t:'生物黑客 · 运动表现'},{n:'NutritionFacts.org – Dr. Greger',t:'植物营养 · 疾病预防'},{n:'Shawn Stevenson – The Model Health Show',t:'睡眠 · 代谢 · 心理'}]
};

const CHANNEL_IDS={
  'Huberman Lab':'UC2D2CMWXMOVWx7giW1n3LIg',
  'Peter Attia – The Drive':'UC8kGsMa0LygSX9nkBcBH1Sg',
  'Found My Fitness – Rhonda Patrick':'UCWB8HkRd_dMHV7e_z7FBWIA',
  'Dr. Mark Hyman':'UC5IuDMmKWSsBFB0iKky6aEQ',
  'ZOE – Tim Spector':'UCMbHMCOh0g-YX4ZcWFzKZjQ',
  'Dr. Mindy Pelz':'UC4cNjUPc2gQKucX3hLUayYQ',
  'Mel Robbins':'UCk2U-Oqn7RXf-ydPqfSxG5g',
  'The Diary of a CEO – Steven Bartlett':'UCGq-a57w-aPwyi3pW7XLiHw',
  'The Proof – Simon Hill':'UCfAFLXCcKQlTt3MgCnFRyJg',
  'On Purpose – Jay Shetty':'UCmJB-CbFQMTKA8ESBHEndlA',
  'Ben Greenfield Life':'UCI1QnEbcK8w3QQ_lRIOfJDg',
  'NutritionFacts.org – Dr. Greger':'UCman6j6KRPB_oTlRqkZCjuA',
  'Shawn Stevenson – The Model Health Show':'UCT1GT5ku7gKmMGO7fDO4RxQ'
};

let selected=null;
Object.entries(CHANNELS).forEach(([gid,chs])=>{
  const grid=document.getElementById(gid);
  chs.forEach(ch=>{
    const card=document.createElement('div');
    card.className='ch';
    card.innerHTML=`<div class="cn">${ch.n}</div><div class="ct">${ch.t}</div>`;
    card.onclick=()=>{
      document.querySelectorAll('.ch').forEach(c=>c.classList.remove('active'));
      card.classList.add('active');
      selected=ch.n;
      document.getElementById('selDisplay').innerHTML=`已选：<strong>${ch.n}</strong>`;
      document.getElementById('fetchBtn').disabled=false;
      document.getElementById('results').innerHTML='<div class="empty">点击右下角按钮获取最新视频</div>';
      document.getElementById('errBox').innerHTML='';
      document.getElementById('status').innerHTML='';
    };
    grid.appendChild(card);
  });
});

function setStatus(msg,loading=false){
  document.getElementById('status').innerHTML=loading?`<div class="spin"></div>${msg}`:msg;
}

function decodeXML(str){
  return str.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g,'$1').trim();
}

function parseRSS(xml, count){
  const entries=[];
  const re=/<entry>([\s\S]*?)<\/entry>/g;
  let m;
  while((m=re.exec(xml))!==null && entries.length<count){
    const e=m[1];
    const title=decodeXML((e.match(/<title[^>]*>(.*?)<\/title>/)||[])[1]||'');
    const published=((e.match(/<published>(.*?)<\/published>/)||[])[1]||'').slice(0,10);
    const videoId=(e.match(/<yt:videoId>(.*?)<\/yt:videoId>/)||[])[1]||'';
    const desc=decodeXML((e.match(/<media:description>([\s\S]*?)<\/media:description>/)||[])[1]||'').slice(0,500);
    if(title&&videoId) entries.push({title,published,videoId,description:desc,url:`https://www.youtube.com/watch?v=${videoId}`});
  }
  return entries;
}

async function fetchVideos(){
  if(!selected)return;
  const count=parseInt(document.getElementById('countSel').value);
  document.getElementById('errBox').innerHTML='';
  document.getElementById('results').innerHTML='';
  document.getElementById('fetchBtn').disabled=true;
  setStatus('正在抓取最新视频列表…',true);

  try{
    const res=await fetch('/api/rss',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({channel:selected,count})});
    const data=await res.json();
    if(!data.ok) throw new Error(data.error);
    const videos=data.videos;
    if(!videos.length) throw new Error('没有找到内容');
    setStatus(`已获取 ${videos.length} 期最新内容，点击「生成草稿」处理`);
    renderVideos(videos);
  }catch(err){
    setStatus('');
    document.getElementById('errBox').innerHTML=`<div class="err">出错了：${err.message}</div>`;
  }finally{
    document.getElementById('fetchBtn').disabled=false;
  }
}

function renderVideos(videos){
  document.getElementById('results').innerHTML=videos.map((v,i)=>`
    <div class="video-card">
      <div class="vc-head">
        <div class="vc-num">0${i+1}</div>
        <div class="vc-meta">
          <div class="vc-title">${v.title}</div>
          <div class="vc-info">${v.published} · <a href="${v.url}" target="_blank" style="color:var(--accent2)">YouTube ↗</a></div>
        </div>
        <button class="vc-btn" id="dbtn${i}" onclick="generateDraft(${i})">生成草稿</button>
      </div>
      <div class="vc-body" id="vb${i}"></div>
    </div>
  `).join('');
  window._videos=videos;
}

async function generateDraft(i){
  const btn=document.getElementById(`dbtn${i}`);
  const body=document.getElementById(`vb${i}`);
  btn.textContent='生成中…';
  btn.disabled=true;
  try{
    const res=await fetch('/api/draft',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({channel:selected,video:window._videos[i]})
    });
    const data=await res.json();
    if(!data.ok)throw new Error(data.error);
    const d=data.draft;
    body.innerHTML=`
      <div class="sec">核心要点</div>
      <div class="kp">${(d.keyPoints||[]).map((p,j)=>`${j+1}. ${p}`).join('\n')}</div>
      <div class="sec">小红书草稿</div>
      <div class="draft" id="draft${i}">${d.xhsDraft||''}</div>
      <button class="copy" id="cp${i}" onclick="copyDraft(${i})">复制草稿</button>
      <div class="sec">话题标签</div>
      <div class="tags">${(d.tags||[]).map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
    `;
    body.classList.add('open');
    btn.textContent='重新生成';
    btn.disabled=false;
  }catch(err){
    body.innerHTML=`<div class="err" style="margin:12px 0">出错了：${err.message}</div>`;
    body.classList.add('open');
    btn.textContent='重试';
    btn.disabled=false;
  }
}

async function copyDraft(i){
  await navigator.clipboard.writeText(document.getElementById(`draft${i}`).textContent);
  const btn=document.getElementById(`cp${i}`);
  btn.textContent='已复制 ✓';btn.classList.add('done');
  setTimeout(()=>{btn.textContent='复制草稿';btn.classList.remove('done')},2000);
}
</script>
</body>
</html>
